---
layout: default
---

<div class="page-content section">
  <div class="container container-narrow">
    {% if page.title %}
    <div class="section-header">
      <h1>{{ page.title }}</h1>
      {% if page.description %}
      <p>{{ page.description }}</p>
      {% endif %}
    </div>
    {% endif %}

    {{ content }}
  </div>
</div>
