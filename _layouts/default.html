<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'tr' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- Theme: prevent FOUC -->
  <script>
    (function() {
      var theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- SEO -->
  {% seo %}

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">

  <!-- RSS Feed -->
  {% feed_meta %}
</head>
<body>
  <!-- Loading Screen -->
  <div class="loader" id="loader" aria-hidden="true">
    <div class="loader-spinner"></div>
  </div>

  <!-- 3D Scene (background) -->
  {% include 3d-scene.html %}

  <!-- Header -->
  {% include header.html %}

  <!-- Main Content -->
  <main id="main-content" role="main">
    {{ content }}
  </main>

  <!-- Footer -->
  {% include footer.html %}

  <!-- CDN Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/i18next@23.16.0/dist/umd/i18next.min.js"></script>

  <!-- App Scripts -->
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/animations.js' | relative_url }}" defer></script>
  <script type="module" src="{{ '/assets/js/three-scene.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/i18n.js' | relative_url }}" defer></script>
</body>
</html>
