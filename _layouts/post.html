---
layout: default
---

<article class="post" itemscope itemtype="http://schema.org/BlogPosting">
  <div class="post-header container">
    <span class="section-label" data-i18n="blog.article">Blog Yazısı</span>
    <h1 itemprop="name headline">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {{ page.date | date: "%d %B %Y" }}
      </time>
      {% if page.lang %}
      <span class="blog-card-lang">{{ page.lang | upcase }}</span>
      {% endif %}
      {% if page.reading_time %}
      <span>· {{ page.reading_time }} min</span>
      {% endif %}
    </div>
  </div>

  <div class="post-content container container-narrow" itemprop="articleBody">
    {{ content }}
  </div>

  <div class="container container-narrow" style="padding-bottom: 4rem;">
    <hr style="border: none; border-top: 1px solid var(--border-primary); margin-bottom: 2rem;">
    <a href="{{ '/blog/' | relative_url }}" class="btn btn-ghost" data-i18n="blog.backToAll">
      ← Tüm Yazılar
    </a>
  </div>
</article>
